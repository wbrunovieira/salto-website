<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
  viewBox="382 22 108 82"
  fill="none"
  width="108"
  height="82"
>
  <!-- ═══════════════════════════════════════════
       Salto — Symbol (linha + bola)
       Layers match the GSAP draw animation order:
         1. line  — drawn first (stroke-dashoffset)
         2. ball  — revealed after line completes
  ═══════════════════════════════════════════ -->

  <g id="line" inkscape:label="Line" inkscape:groupmode="layer">
    <path
      id="line-path"
      d="M392 96C466 121.6 476.5 65.3333 472.5 34"
      stroke="#FF5C00"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
    />
  </g>

  <g id="ball" inkscape:label="Ball" inkscape:groupmode="layer">
    <circle
      id="ball-circle"
      cx="472.5"
      cy="39"
      r="9.5"
      fill="#FF5C00"
    />
  </g>

</svg>
